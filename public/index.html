<!DOCTYPE html>
<html>
<head>
    <title>Python Chat Viewer</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .message { margin-bottom: 15px; }
        .sender { font-weight: bold; color: blue; }
        .time { color: gray; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>Chat Logs</h1>
    <div id="chat">
        {% for msg in messages %}
        <div class="message">
            <span class="sender">{{ msg.sender }}</span>
            <span class="time">{{ msg.time }}</span>
            <p>{{ msg.text }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
